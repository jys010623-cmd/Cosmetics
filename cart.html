<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>장바구니 - Fluttery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{--point:#e94378;--main:#111;--sub:#6f666a;--bg:#fff;--line:#eee6e9;--font-ko:Pretendard,"Noto Sans KR","Malgun Gothic",Arial,sans-serif;--font-en:Archivo,Arial,sans-serif;--max:1500px;--radius:8px}*{box-sizing:border-box}body{margin:0;font-family:var(--font-ko);color:var(--main);background:var(--bg)}a{text-decoration:none;color:inherit}img{display:block;width:100%;height:auto}.wrap{max-width:var(--max);margin:auto;padding:0 32px}.top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line)}.head{height:78px;display:flex;align-items:center;justify-content:space-between}.logo{font-family:var(--font-en);font-size:25px;font-weight:900}.nav,.icons{display:flex;align-items:center;gap:28px}.nav a{font-size:14px;font-weight:800}.nav a:hover,.icons a:hover{color:var(--point)}.page{padding:70px 0 110px}.eyebrow{font-size:12px;font-weight:900;color:var(--point);letter-spacing:.16em}.title{border-bottom:1px solid var(--line);padding-bottom:24px;margin-bottom:28px}.title h1{font-size:42px;margin:8px 0 0}.cart{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}.cart th,.cart td{border-bottom:1px solid var(--line);padding:16px;text-align:left}.thumb{width:88px;height:88px;object-fit:cover;border-radius:8px}input[type=number]{width:70px;height:38px;border:1px solid var(--line);border-radius:8px;padding:0 8px}.sum{margin-left:auto;margin-top:26px;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:26px}.sum div{display:flex;justify-content:space-between;padding:12px 0}.sum strong{font-size:24px;color:var(--point)}.btn{width:100%;height:52px;border:0;border-radius:8px;background:var(--main);color:#fff;font-weight:800;margin-top:16px}.foot{padding:56px 0;background:#111;color:#eee}.foot .wrap{display:flex;justify-content:space-between}.foot p{color:#aaa;line-height:1.75}@media(max-width:900px){.wrap{padding:0 18px}.nav{display:none}.cart thead{display:none}.cart tr,.cart td{display:block}.foot .wrap{display:block}}
</style></head>
<body><header class="top"><div class="wrap head"><a class="logo" href="index.html">Fluttery</a><nav class="nav"><a href="products.html">SHOP</a><a href="products.html">NEW</a><a href="notice.html">NOTICE</a><a href="review-board.html">REVIEW</a><a href="qna.html">Q&A</a></nav><div class="icons"><a href="login.html"><i class="fa-regular fa-user"></i></a><a href="cart.html"><i class="fa-solid fa-bag-shopping"></i></a></div></div></header>
<main class="page"><div class="wrap"><div class="title"><span class="eyebrow">CART</span><h1>장바구니</h1></div><table class="cart"><thead><tr><th><input type="checkbox" class="sel-all" checked></th><th>상품</th><th>상품명</th><th>수량</th><th>합계</th><th>삭제</th></tr></thead><tbody><tr data-unit="18000"><td><input type="checkbox" class="sel" checked></td><td><img class="thumb" src="assets/images/product-01.jpg" alt=""></td><td>Velvet Ink Tint</td><td><input type="number" class="qnum" value="1" min="1"></td><td class="line" style="color:var(--point);font-weight:800">18,000원</td><td><button class="del">삭제</button></td></tr><tr data-unit="34000"><td><input type="checkbox" class="sel" checked></td><td><img class="thumb" src="assets/images/product-08.jpg" alt=""></td><td>Nine Mood Palette</td><td><input type="number" class="qnum" value="1" min="1"></td><td class="line" style="color:var(--point);font-weight:800">34,000원</td><td><button class="del">삭제</button></td></tr></tbody></table><aside class="sum"><div><span>상품금액</span><b id="sub-amount">52,000원</b></div><div><span>배송비</span><b id="ship-amount">0원</b></div><div><span>총 결제예정금액</span><strong id="total-amount">52,000원</strong></div><button class="btn">주문하기</button></aside></div></main>
<footer class="foot"><div class="wrap"><div><a class="logo" href="index.html">Fluttery</a><p>색조 화장품 쇼핑몰 스킨 샘플<br>구매, 결제, 로그인 기능은 카페24 모듈 영역입니다.</p></div><p>Company 000-00-00000<br>Customer 10:00-17:00<br>Instagram / Kakao / Naver</p></div></footer>
<script>
function won(n){return n.toLocaleString('ko-KR')+'원';}
var table=document.querySelector('.cart');
function recalc(){
  var subtotal=0;
  table.querySelectorAll('tbody tr').forEach(function(tr){
    var q=tr.querySelector('.qnum');
    var qty=Math.max(1,parseInt(q.value,10)||1);
    q.value=qty;
    var unit=parseInt(tr.getAttribute('data-unit'),10)||0;
    var line=unit*qty;
    tr.querySelector('.line').textContent=won(line);
    if(tr.querySelector('.sel').checked){subtotal+=line;}
  });
  var ship=(subtotal===0||subtotal>=30000)?0:3000;
  document.getElementById('sub-amount').textContent=won(subtotal);
  document.getElementById('ship-amount').textContent=won(ship);
  document.getElementById('total-amount').textContent=won(subtotal+ship);
}
table.addEventListener('input',function(e){if(e.target.classList.contains('qnum')){recalc();}});
table.addEventListener('change',function(e){if(e.target.classList.contains('sel')){recalc();}});
var selAll=table.querySelector('.sel-all');
if(selAll){selAll.addEventListener('change',function(){table.querySelectorAll('tbody .sel').forEach(function(c){c.checked=selAll.checked;});recalc();});}
table.querySelectorAll('.del').forEach(function(btn){
  btn.addEventListener('click',function(){var tr=btn.closest('tr');if(tr){tr.parentNode.removeChild(tr);}recalc();});
});
recalc();
</script>
</body></html>
